name: Repository compliance

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install package metadata
        run: npm ci

      - name: Validate repository baseline
        run: npm test
