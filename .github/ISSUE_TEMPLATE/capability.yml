name: Capability slice
description: Define one bounded, provable capability.
title: "capability: "
labels: ["capability"]
body:
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and repeated intent
      description: What typed host events show this need, and how often?
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Capability contract
      description: Purpose, inputs, outputs, permissions, prohibitions, limits, tests, install, and rollback.
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Required proof
      description: Unit, adversarial, permission, replay, and rollback evidence.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: No real user data is required.
          required: true
        - label: Installation remains a separate human action.
          required: true
        - label: Rollback is explicit and testable.
          required: true
